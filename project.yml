name: CoupleChat
options:
  bundleIdPrefix: com.hugxu0
  deploymentTarget:
    iOS: "26.0"

packages:
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    from: 16.1.0
  GLTFKit2:
    url: https://github.com/warrenm/GLTFKit2
    exactVersion: 0.5.15

targets:
  CoupleChat:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: SocketIO
        product: SocketIO
      - package: GLTFKit2
        product: GLTFKit2
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: 悄悄话
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "2"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: 用于拍摄并上传头像
        NSPhotoLibraryAddUsageDescription: 保存聊天图片和视频到相册
        NSPhotoLibraryUsageDescription: 用于读取并发送照片和实况照片
        NSMicrophoneUsageDescription: 用于录制语音消息
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        SERVER_BASE_URL: https://hoo66.top
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hugxu0.couplechat.native
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"

  CoupleChatTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CoupleChatTests
    dependencies:
      - target: CoupleChat
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        PRODUCT_BUNDLE_IDENTIFIER: com.hugxu0.couplechat.native.tests
        SWIFT_VERSION: "5.9"
