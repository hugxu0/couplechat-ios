name: CoupleChat
options:
  bundleIdPrefix: com.hugxu0
  deploymentTarget:
    iOS: "26.0"

packages:
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    exactVersion: 16.1.0
  GLTFKit2:
    url: https://github.com/warrenm/GLTFKit2
    exactVersion: 0.5.15

targets:
  CoupleChat:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: SocketIO
        product: SocketIO
      - package: GLTFKit2
        product: GLTFKit2
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: 悄悄话
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "14"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleURLTypes:
          - CFBundleURLName: com.hugxu0.couplechat.native.deep-link
            CFBundleURLSchemes:
              - couplechat
        NSCameraUsageDescription: 用于拍摄并上传头像
        NSPhotoLibraryAddUsageDescription: 保存聊天图片和视频到相册
        NSPhotoLibraryUsageDescription: 用于读取并发送照片和实况照片
        NSMicrophoneUsageDescription: 用于录制语音消息
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        SERVER_BASE_URL: $(SERVER_BASE_URL)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hugxu0.couplechat.native
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.9"
        SERVER_BASE_URL: https://hoo66.top
      configs:
        Debug:
          # 本机联调可改为 http://127.0.0.1:8080；默认仍连生产时会有 DEBUG 横幅提示。
          SERVER_BASE_URL: https://hoo66.top
        Release:
          SERVER_BASE_URL: https://hoo66.top
