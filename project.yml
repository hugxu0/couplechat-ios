name: CoupleChat
options:
  bundleIdPrefix: com.hugxu0
  deploymentTarget:
    iOS: "17.0"

packages:
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    from: 16.1.0

targets:
  CoupleChat:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: SocketIO
        product: SocketIO
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: 悄悄话
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        NSCameraUsageDescription: 用于拍摄并上传头像
        NSPhotoLibraryAddUsageDescription: 保存聊天图片和视频到相册
        NSMicrophoneUsageDescription: 用于录制语音消息
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hugxu0.couplechat.native
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_KEY_UIUserInterfaceStyle: Light
