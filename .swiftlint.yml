disabled_rules:
  - trailing_whitespace
  - identifier_name
  - line_length
  - function_body_length
  - type_body_length
  - file_length
  - large_tuple
  - cyclomatic_complexity
  - nesting
  - force_cast
  - force_try
  - comma
  - type_name
  - trailing_comma
  - function_parameter_count
  - implicit_optional_initialization
  - vertical_whitespace
  - modifier_order
  - statement_position
  - opening_brace
  - closure_parameter_position
  - no_space_in_method_call
  - colon
  - return_arrow_whitespace
  - unused_closure_parameter
  - weak_delegate
  - redundant_optional_initialization
  - multiple_closures_with_trailing_closure
  - void_return
  - empty_parentheses_with_trailing_closure
  - syntactic_sugar
  - mark
  - todo
  - no_fallthrough_only
  - fallthrough
  - control_statement
  - trailing_semicolon
  - vertical_parameter_alignment
  - void_return_in_closure

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - first_where
  - overridden_super_call
  - private_action
  - private_outlet
  - prohibited_super_call
  - redundant_nil_coalescing
  - toggle_bool

excluded:
  - build
  - build-artifacts
  - DerivedData
  - node_modules
  - server
  - .build
  - .github

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 60
  excluded:
    - id
    - i
    - j
    - x
    - y
    - to
    - at

type_body_length:
  warning: 800
  error: 1500

function_body_length:
  warning: 150
  error: 300
