server {
    listen 80;
    listen [::]:80;
    server_name hoo66.top;
    root /var/www/hoo66;

    add_header X-Robots-Tag "noindex, nofollow" always;

    location /.well-known/acme-challenge/ {
        root /var/www/hoo66;
        default_type text/plain;
    }

    location ^~ /sub/ { return 404; }
    location ^~ /assets/2026/client/ { return 404; }
    location ^~ /assets/2026/system/profile/ { return 404; }
    location ^~ /api/hutoken/ { return 404; }

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 127.0.0.1:8444 ssl default_server;
    server_name hoo66.top;
    root /var/www/hoo66;

    ssl_certificate /etc/letsencrypt/live/hoo66.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hoo66.top/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 80m;
    add_header X-Robots-Tag "noindex, nofollow" always;

    location ^~ /sub/ { return 404; }

    location ^~ /assets/2026/system/profile/ {
        autoindex off;
        default_type text/plain;
        types {
            text/yaml yaml yml;
            text/plain txt conf;
        }
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Cache-Control "private, no-store, max-age=0" always;
        try_files $uri =404;
    }

    location = /api/hutoken/__SUB_TOKEN__ {
        default_type text/plain;
        add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
        add_header Cache-Control "private, no-store, max-age=0" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $codex_universal_sub_file =404;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }
}
