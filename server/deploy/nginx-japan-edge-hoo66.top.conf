server {
    listen 80;
    listen [::]:80;
    server_name hoo66.top;
    root /var/www/hoo66;

    location /.well-known/acme-challenge/ {
        root /var/www/hoo66;
        default_type text/plain;
    }

    location / { try_files $uri $uri/ =404; }
}

server {
    listen 127.0.0.1:8444 ssl default_server;
    server_name hoo66.top;

    ssl_certificate /etc/letsencrypt/live/hoo66.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hoo66.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 80m;

    # 订阅等本机静态 location 保留在此 block 中，且必须放在 / 之前。
    location / {
        proxy_pass https://chat.huhuhu.top;
        proxy_ssl_server_name on;
        proxy_ssl_name chat.huhuhu.top;
        proxy_http_version 1.1;
        proxy_set_header Host hoo66.top;
        proxy_set_header X-CoupleChat-Proxy-Key "__PROXY_KEY__";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
