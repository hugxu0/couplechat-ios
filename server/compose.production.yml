services:
  couplechat-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: couplechat-server:local
    container_name: couplechat-server
    network_mode: host
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: ${HOST:-127.0.0.1}
      PORT: ${PORT:-3000}
    volumes:
      - ./uploads:/app/uploads
      - ./.data:/app/.data
    restart: unless-stopped
    mem_limit: 300m
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
