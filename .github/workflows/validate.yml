name: 项目质量验证

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "Docs/**"
      - "README.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "Docs/**"
      - "README.md"

permissions:
  contents: read

concurrency:
  group: validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-repository-safety:
    name: Public repository safety
    if: github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/public-repository-safety.yml

  server:
    name: Server
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Use Node.js 22
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate backup shell safety
        run: |
          bash -n scripts/*.sh tests/operations/*.test.sh
          bash tests/operations/backup-retention.test.sh

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  ios:
    name: iOS
    runs-on: macos-15
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: "26.3"

      - name: Install tools
        run: brew install swiftlint xcodegen

      - name: Generate project
        run: |
          mkdir -p build-artifacts
          xcodegen generate

      - name: SwiftLint
        run: swiftlint lint --reporter github-actions-logging

      - name: Guard structure of new Swift files
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          BASE_SHA="$PR_BASE_SHA"
          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="$PUSH_BEFORE_SHA"
          fi
          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]] || ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            BASE_SHA="$(git rev-parse HEAD^)"
          fi
          git diff --diff-filter=A --name-only "$BASE_SHA" "$GITHUB_SHA" -- '*.swift' \
            | tee build-artifacts/new-swift-files.txt
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            swiftlint lint --strict --config .swiftlint-structure.yml "$file"
          done < build-artifacts/new-swift-files.txt

      - name: Unit tests on iPhone
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 .github/scripts/select-ios-simulator.py "iPhone 17")
          xcodebuild test \
            -project CoupleChat.xcodeproj \
            -scheme CoupleChat \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -resultBundlePath "$PWD/build-artifacts/CoupleChatTests.xcresult" \
            CODE_SIGNING_ALLOWED=NO

      - name: Compile for iPad
        run: |
          IPAD_ID=$(xcrun simctl list devices available -j | python3 .github/scripts/select-ios-simulator.py "iPad")
          xcodebuild build \
            -project CoupleChat.xcodeproj \
            -scheme CoupleChat \
            -destination "platform=iOS Simulator,id=$IPAD_ID" \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: CoupleChat-validation-failure-${{ github.run_id }}-${{ github.run_attempt }}
          path: build-artifacts/
          if-no-files-found: warn
          retention-days: 7
