name: iOS 日常验证与构建

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-server:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  verify-and-build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 26.3
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Install tools
        run: brew install swiftlint xcodegen

      - name: Record build environment
        run: |
          mkdir -p build-artifacts
          {
            echo "## Xcode"
            xcodebuild -version
            echo
            echo "## SDKs"
            xcodebuild -showsdks
            echo
            echo "## Simulator runtimes"
            xcrun simctl list runtimes
            echo
            echo "## Tools"
            swiftlint version
            xcodegen --version
          } | tee build-artifacts/environment.txt

      - name: Generate project
        run: xcodegen generate

      - name: SwiftLint
        run: swiftlint lint --reporter github-actions-logging

      - name: Guard structure of new Swift files
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          BASE_SHA="$PR_BASE_SHA"
          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            BASE_SHA="$PUSH_BEFORE_SHA"
          fi
          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]] || ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            BASE_SHA="$(git rev-parse HEAD^)"
          fi
          git diff --diff-filter=A --name-only "$BASE_SHA" "$GITHUB_SHA" -- '*.swift' \
            | tee build-artifacts/new-swift-files.txt
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            swiftlint lint --strict --config .swiftlint-structure.yml "$file"
          done < build-artifacts/new-swift-files.txt

      - name: Unit tests
        run: |
          set -o pipefail
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 .github/scripts/select-ios-simulator.py "iPhone 17")
          xcodebuild test \
            -project CoupleChat.xcodeproj \
            -scheme CoupleChat \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -resultBundlePath "$PWD/build-artifacts/CoupleChatTests.xcresult" \
            CODE_SIGNING_ALLOWED=NO

      - name: Build for iPad simulator
        run: |
          IPAD_ID=$(xcrun simctl list devices available -j | python3 .github/scripts/select-ios-simulator.py "iPad")
          xcodebuild build \
            -project CoupleChat.xcodeproj \
            -scheme CoupleChat \
            -destination "platform=iOS Simulator,id=$IPAD_ID" \
            CODE_SIGNING_ALLOWED=NO

      - name: Archive unsigned app
        run: |
          xcodebuild archive \
            -project CoupleChat.xcodeproj \
            -scheme CoupleChat \
            -configuration Release \
            -archivePath "$PWD/build/CoupleChat.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -R build/CoupleChat.xcarchive/Products/Applications/CoupleChat.app build/Payload/
          cd build
          zip -qry CoupleChat-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CoupleChat-unsigned-${{ github.run_number }}
          path: build/CoupleChat-unsigned.ipa
          retention-days: 30

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CoupleChat-diagnostics-${{ github.run_number }}
          path: build-artifacts/
          if-no-files-found: warn
          retention-days: 14
