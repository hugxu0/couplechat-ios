name: iOS 日常验证与构建

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Select stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install tools
        run: brew install swiftlint xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: SwiftLint
        run: swiftlint lint --reporter github-actions-logging

      - name: Unit tests
        run: |
          set -o pipefail
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c 'import json,sys; devices=json.load(sys.stdin)["devices"]; print(next(item["udid"] for runtime in devices.values() for item in runtime if item["name"].startswith("iPhone")))')
          xcodebuild test \
            -project CoupleChat.xcodeproj \
            -scheme CoupleChat \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            CODE_SIGNING_ALLOWED=NO

      - name: Archive unsigned app
        run: |
          xcodebuild archive \
            -project CoupleChat.xcodeproj \
            -scheme CoupleChat \
            -configuration Release \
            -archivePath "$PWD/build/CoupleChat.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Package unsigned IPA
        run: |
          mkdir -p build/Payload
          cp -R build/CoupleChat.xcarchive/Products/Applications/CoupleChat.app build/Payload/
          cd build
          zip -qry CoupleChat-unsigned.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: CoupleChat-unsigned-${{ github.run_number }}
          path: build/CoupleChat-unsigned.ipa
          retention-days: 30
